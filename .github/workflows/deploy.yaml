name: Deploy Knowledge Base

on:
  push:
    branches:
      - main
    paths-ignore:
      - .gitignore
      - README.md
      - CONTRIBUTING.md
      - LICENSE
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

concurrency:
  group: deploy-knowledge-base
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 4
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run linters
        run: npm run lint:all

      - name: Run scripts in script directory
        env:
          URL_CHECKER_TIMEOUT: ${{ vars.URL_CHECKER_TIMEOUT }}
        run: |
          set -euo pipefail
          for file in script/*; do
            [ -f "$file" ] || continue

            case "$file" in
              *.js)
                if [ "$(basename "$file")" = "url-checker.js" ]; then
                  timeout_value="${URL_CHECKER_TIMEOUT:-5}"
                  node "$file" -t "$timeout_value" -d "src/posts"
                else
                  node "$file"
                fi
                ;;
              *.sh)
                bash "$file"
                ;;
            esac
          done

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - test
    timeout-minutes: 4
    permissions:
      contents: read
    env:
      PATH_PREFIX: /${{ github.event.repository.name }}/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run prod

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - test
      - build
    if: ${{ needs.test.result == 'success' && needs.build.result == 'success' && github.event_name != 'pull_request' }}
    timeout-minutes: 4
    permissions:
      contents: read
      pages: write
      id-token: write
      issues: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create deployment status issue
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_STATUS: ${{ steps.deployment.outcome }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          echo "$GITHUB_TOKEN" | gh auth login --with-token
          today="$(date -u +%F)"
          status="$DEPLOY_STATUS"
          if [ -z "$PAGE_URL" ]; then
            PAGE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          fi
          gh issue create \
            --title "$today - Deployment: $status" \
            --body "URL: $PAGE_URL"
